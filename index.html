<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>mystats.fm</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-primary: #ffffff;
      --bg-secondary: #f5f5f5;
      --bg-tertiary: #ececec;
      --text-primary: #111111;
      --text-secondary: #666666;
      --text-tertiary: #aaaaaa;
      --border: rgba(0,0,0,0.1);
      --border-strong: rgba(0,0,0,0.2);
      --radius-md: 8px;
      --radius-lg: 12px;
      --green: #1DB954;
      --green-hover: #1ed760;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg-primary: #121212;
        --bg-secondary: #1e1e1e;
        --bg-tertiary: #2a2a2a;
        --text-primary: #ffffff;
        --text-secondary: #aaaaaa;
        --text-tertiary: #666666;
        --border: rgba(255,255,255,0.1);
        --border-strong: rgba(255,255,255,0.2);
      }
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg-tertiary);
      color: var(--text-primary);
      min-height: 100vh;
    }

    #app {
      max-width: 680px;
      margin: 0 auto;
      padding: 2rem 1rem;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 2rem;
    }

    .logo {
      width: 40px;
      height: 40px;
      background: var(--green);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .logo svg { width: 22px; height: 22px; fill: white; }

    .header h1 { font-size: 22px; font-weight: 600; color: var(--text-primary); }
    .header p { font-size: 13px; color: var(--text-secondary); }

    /* Connect screen */
    .connect-box {
      background: var(--bg-primary);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 3rem 2rem;
      text-align: center;
    }

    .connect-box h2 { font-size: 18px; font-weight: 600; margin-bottom: 0.5rem; }
    .connect-box p { color: var(--text-secondary); font-size: 14px; margin-bottom: 2rem; line-height: 1.7; max-width: 380px; margin-left: auto; margin-right: auto; }

    .btn-spotify {
      background: var(--green);
      color: white;
      border: none;
      border-radius: 999px;
      padding: 12px 32px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      transition: background 0.15s;
    }

    .btn-spotify:hover { background: var(--green-hover); }

    /* User header */
    .user-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 1.5rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--border);
    }

    .user-avatar { width: 48px; height: 48px; border-radius: 50%; object-fit: cover; }
    .user-avatar-ph {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: var(--bg-secondary);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 600;
      color: var(--text-secondary);
      flex-shrink: 0;
    }

    .user-name { font-size: 16px; font-weight: 600; }
    .user-info { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }

    .logout-btn {
      margin-left: auto;
      font-size: 12px;
      padding: 6px 14px;
      border: 1px solid var(--border-strong);
      border-radius: 999px;
      background: none;
      cursor: pointer;
      color: var(--text-secondary);
      transition: background 0.15s;
    }
    .logout-btn:hover { background: var(--bg-secondary); }

    /* Stats grid */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 1.5rem;
    }

    .stat-card {
      background: var(--bg-primary);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 1rem;
    }

    .stat-label { font-size: 11px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; }
    .stat-value { font-size: 24px; font-weight: 700; color: var(--text-primary); }
    .stat-sub { font-size: 11px; color: var(--text-tertiary); margin-top: 2px; }

    /* Now playing */
    .now-playing {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      border-radius: var(--radius-md);
      background: var(--bg-primary);
      border: 1px solid var(--border);
      margin-bottom: 1.5rem;
    }

    .now-playing-pulse {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--green);
      flex-shrink: 0;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.8); }
    }

    .now-playing-img { width: 44px; height: 44px; border-radius: 4px; object-fit: cover; flex-shrink: 0; }
    .now-playing-img-ph { width: 44px; height: 44px; border-radius: 4px; background: var(--bg-secondary); flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
    .now-playing-label { font-size: 10px; color: var(--green); font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; }
    .now-playing-track { font-size: 14px; font-weight: 600; }
    .now-playing-artist { font-size: 12px; color: var(--text-secondary); }

    /* Tabs */
    .tabs {
      display: flex;
      gap: 0;
      margin-bottom: 1rem;
      border-bottom: 1px solid var(--border);
    }

    .tab {
      padding: 10px 18px;
      font-size: 14px;
      cursor: pointer;
      border: none;
      background: none;
      color: var(--text-secondary);
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      transition: color 0.15s;
      font-weight: 500;
    }

    .tab:hover { color: var(--text-primary); }
    .tab.active { color: var(--green); border-bottom-color: var(--green); }

    /* Period buttons */
    .period-btns {
      display: flex;
      gap: 6px;
      margin-bottom: 1.5rem;
    }

    .period-btn {
      font-size: 12px;
      padding: 5px 14px;
      border: 1px solid var(--border-strong);
      border-radius: 999px;
      background: none;
      cursor: pointer;
      color: var(--text-secondary);
      transition: all 0.15s;
    }

    .period-btn:hover { border-color: var(--green); color: var(--green); }
    .period-btn.active { background: var(--green); color: white; border-color: var(--green); }

    /* Track list */
    .track-list { display: flex; flex-direction: column; gap: 6px; }

    .track-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 12px;
      border-radius: var(--radius-md);
      border: 1px solid var(--border);
      background: var(--bg-primary);
      transition: background 0.15s;
    }

    .track-item:hover { background: var(--bg-secondary); }

    .track-rank { font-size: 12px; color: var(--text-tertiary); min-width: 22px; text-align: center; font-weight: 600; }
    .track-img { width: 42px; height: 42px; border-radius: 4px; object-fit: cover; flex-shrink: 0; }
    .track-img-ph { width: 42px; height: 42px; border-radius: 4px; background: var(--bg-secondary); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .track-info { flex: 1; min-width: 0; }
    .track-name { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .track-artist { font-size: 12px; color: var(--text-secondary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px; }

    .pop-wrap { display: flex; flex-direction: column; align-items: flex-end; gap: 3px; flex-shrink: 0; }
    .pop-bar-bg { width: 64px; height: 3px; background: var(--bg-tertiary); border-radius: 2px; }
    .pop-bar { height: 3px; background: var(--green); border-radius: 2px; }
    .pop-label { font-size: 10px; color: var(--text-tertiary); }

    .time-label { font-size: 10px; color: var(--text-tertiary); text-align: right; flex-shrink: 0; white-space: nowrap; }

    /* Taste tab */
    .section-title {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 0.75rem;
    }

    .genre-list { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 2rem; }
    .genre-pill { padding: 5px 14px; border-radius: 999px; border: 1px solid var(--border-strong); font-size: 13px; color: var(--text-secondary); transition: all 0.15s; }
    .genre-pill.top { background: var(--green); color: white; border-color: var(--green); }

    .audio-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
    .audio-card { background: var(--bg-primary); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 14px; }
    .audio-name { font-size: 12px; color: var(--text-secondary); margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
    .audio-bar-bg { height: 4px; background: var(--bg-tertiary); border-radius: 2px; }
    .audio-bar { height: 4px; border-radius: 2px; background: var(--green); }
    .audio-val { font-size: 20px; font-weight: 700; margin-top: 6px; }

    /* Loading */
    .loading {
      text-align: center;
      padding: 4rem;
      color: var(--text-secondary);
      font-size: 14px;
    }

    .spinner {
      width: 32px;
      height: 32px;
      border: 2px solid var(--border);
      border-top-color: var(--green);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 1rem;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div id="app">
  <div class="header">
    <div class="logo">
      <svg viewBox="0 0 24 24"><path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.02.599-1.559.3z"/></svg>
    </div>
    <div>
      <h1>mystats.fm</h1>
      <p>Tu historial de Spotify</p>
    </div>
  </div>
  <div id="content"></div>
</div>

<script>
  const CLIENT_ID = '28ca6f900b2a4af189988ba5f533cd46';
  const REDIRECT_URI = window.location.origin + window.location.pathname;
  const SCOPES = 'user-read-recently-played user-top-read user-read-currently-playing user-read-private';

  let accessToken = null;
  let currentTab = 'tracks';
  let currentPeriod = 'short_term';
  let displayLimit = 10;
  let userData = {};

  async function pkceChallengeFromVerifier(v) {
    const data = new TextEncoder().encode(v);
    const digest = await window.crypto.subtle.digest('SHA-256', data);
    return btoa(String.fromCharCode(...new Uint8Array(digest)))
      .replace(/\+/g, '-').replace(/\//g, '_').replace(/=/g, '');
  }

  function generateVerifier(length) {
    const possible = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
    const values = crypto.getRandomValues(new Uint8Array(length));
    return values.reduce((acc, x) => acc + possible[x % possible.length], '');
  }

  async function login() {
    const verifier = generateVerifier(128);
    const challenge = await pkceChallengeFromVerifier(verifier);
    sessionStorage.setItem('pkce_verifier', verifier);
    const params = new URLSearchParams({
      client_id: CLIENT_ID,
      response_type: 'code',
      redirect_uri: REDIRECT_URI,
      scope: SCOPES,
      code_challenge_method: 'S256',
      code_challenge: challenge,
    });
    window.location.href = 'https://accounts.spotify.com/authorize?' + params.toString();
  }

  async function exchangeCode(code) {
    const verifier = sessionStorage.getItem('pkce_verifier');
    const resp = await fetch('https://accounts.spotify.com/api/token', {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: new URLSearchParams({ client_id: CLIENT_ID, grant_type: 'authorization_code', code, redirect_uri: REDIRECT_URI, code_verifier: verifier }),
    });
    const data = await resp.json();
    if (data.access_token) {
      accessToken = data.access_token;
      sessionStorage.setItem('spotify_token', accessToken);
      sessionStorage.setItem('spotify_token_exp', Date.now() + data.expires_in * 1000);
      window.history.replaceState({}, '', window.location.pathname);
      return true;
    }
    console.error('Token exchange failed', data);
    return false;
  }

  async function spotifyGet(path) {
    const r = await fetch('https://api.spotify.com/v1' + path, {
      headers: { Authorization: 'Bearer ' + accessToken }
    });
    if (r.status === 401) { logout(); return null; }
    if (r.status === 204 || !r.ok) return null;
    const text = await r.text();
    if (!text) return null;
    return JSON.parse(text);
  }

  function logout() {
    sessionStorage.clear();
    accessToken = null;
    userData = {};
    renderConnect();
  }

  function renderConnect() {
    document.getElementById('content').innerHTML = `
      <div class="connect-box">
        <h2>Bienvenido a mystats.fm</h2>
        <p>Conecta tu cuenta de Spotify para ver tus estadísticas de escucha: top tracks, artistas, géneros favoritos y más.</p>
        <button class="btn-spotify" onclick="login()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="white"><path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.02.599-1.559.3z"/></svg>
          Conectar con Spotify
        </button>
      </div>`;
  }

  function renderLoading() {
    document.getElementById('content').innerHTML = `<div class="loading"><div class="spinner"></div>Cargando tus datos...</div>`;
  }

  async function loadAndRender() {
    renderLoading();
    const [profile, topTracks, topArtists, recent, playing] = await Promise.all([
      spotifyGet('/me'),
      spotifyGet('/me/top/tracks?limit=50&time_range=' + currentPeriod),
      spotifyGet('/me/top/artists?limit=50&time_range=' + currentPeriod),
      spotifyGet('/me/player/recently-played?limit=50'),
      spotifyGet('/me/player/currently-playing'),
    ]);
    if (!profile) return;
    userData = { profile, topTracks, topArtists, recent, playing };
    renderDashboard();
  }

  function renderDashboard() {
    const { profile, topTracks, topArtists, recent, playing } = userData;
    const initials = profile.display_name
      ? profile.display_name.split(' ').map(w => w[0]).join('').slice(0, 2).toUpperCase()
      : '?';
    const avatarUrl = profile.images && profile.images[0] ? profile.images[0].url : null;

    let totalMinutes = 0;
    let uniqueArtists = new Set();
    (recent?.items || []).forEach(i => {
      totalMinutes += (i.track?.duration_ms || 0) / 60000;
      (i.track?.artists || []).forEach(a => uniqueArtists.add(a.id));
    });

    const genres = {};
    (topArtists?.items || []).forEach(a => (a.genres || []).forEach(g => { genres[g] = (genres[g] || 0) + 1; }));
    const topGenres = Object.entries(genres).sort((a, b) => b[1] - a[1]).slice(0, 10);

    const avgPop = topTracks && topTracks.items && topTracks.items.length
      ? Math.round(topTracks.items.reduce((s, t) => s + t.popularity, 0) / topTracks.items.length)
      : 0;

    let nowPlayingHtml = '';
    if (playing && playing.item) {
      const img = playing.item.album.images[0]
        ? `<img class="now-playing-img" src="${playing.item.album.images[0].url}">`
        : `<div class="now-playing-img-ph"><i class="ti ti-music" style="font-size:20px;color:var(--text-tertiary)"></i></div>`;
      nowPlayingHtml = `
        <div class="now-playing">
          <div class="now-playing-pulse"></div>
          ${img}
          <div style="flex:1;min-width:0">
            <div class="now-playing-label">Escuchando ahora</div>
            <div class="now-playing-track">${playing.item.name}</div>
            <div class="now-playing-artist">${playing.item.artists.map(a => a.name).join(', ')}</div>
          </div>
        </div>`;
    }

    const tabsHtml = `
      <div class="tabs">
        <button class="tab ${currentTab === 'tracks' ? 'active' : ''}" onclick="setTab('tracks')">Top Tracks</button>
        <button class="tab ${currentTab === 'artists' ? 'active' : ''}" onclick="setTab('artists')">Artistas</button>
        <button class="tab ${currentTab === 'recent' ? 'active' : ''}" onclick="setTab('recent')">Recientes</button>
        <button class="tab ${currentTab === 'taste' ? 'active' : ''}" onclick="setTab('taste')">Tu gusto</button>
      </div>
      <div style="display:${currentTab === 'recent' ? 'none' : 'flex'}; justify-content:space-between; align-items:center; margin-bottom:1rem; flex-wrap:wrap; gap:8px;">
        <div class="period-btns" style="margin-bottom:0">
          <button class="period-btn ${currentPeriod === 'short_term' ? 'active' : ''}" onclick="setPeriod('short_term')">4 semanas</button>
          <button class="period-btn ${currentPeriod === 'medium_term' ? 'active' : ''}" onclick="setPeriod('medium_term')">6 meses</button>
          <button class="period-btn ${currentPeriod === 'long_term' ? 'active' : ''}" onclick="setPeriod('long_term')">Siempre</button>
        </div>
        <div style="display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text-secondary)">
          Mostrar
          <select onchange="setLimit(this.value)" style="font-size:12px;padding:4px 8px;border:1px solid var(--border-strong);border-radius:6px;background:var(--bg-primary);color:var(--text-primary);cursor:pointer">
            <option value="10" ${displayLimit===10?'selected':''}>10</option>
            <option value="20" ${displayLimit===20?'selected':''}>20</option>
            <option value="50" ${displayLimit===50?'selected':''}>50</option>
          </select>
        </div>
      </div>`;

    let mainContent = '';

    if (currentTab === 'tracks' && topTracks && topTracks.items) {
      mainContent = `<div class="track-list">${topTracks.items.slice(0, displayLimit).map((t, i) => {
        const img = t.album.images[0]
          ? `<img class="track-img" src="${t.album.images[1]?.url || t.album.images[0].url}">`
          : `<div class="track-img-ph"><i class="ti ti-music" style="font-size:16px;color:var(--text-tertiary)"></i></div>`;
        return `<div class="track-item">
          <span class="track-rank">${i + 1}</span>
          ${img}
          <div class="track-info">
            <div class="track-name">${t.name}</div>
            <div class="track-artist">${t.artists.map(a => a.name).join(', ')} · ${t.album.name}</div>
          </div>
          <div class="pop-wrap">
            <div class="pop-bar-bg"><div class="pop-bar" style="width:${t.popularity}%"></div></div>
            <div class="pop-label">${t.popularity}% popularidad</div>
          </div>
        </div>`;
      }).join('')}</div>`;

    } else if (currentTab === 'artists' && topArtists && topArtists.items) {
      mainContent = `<div class="track-list">${topArtists.items.slice(0, displayLimit).map((a, i) => {
        const images = a.images || [];
        const imgSrc = images.length > 0 ? (images.find(img => img.width <= 160)?.url || images[images.length-1].url) : null;
        const img = imgSrc
          ? `<img class="track-img" src="${imgSrc}" style="border-radius:50%" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
          : '';
        const imgPh = `<div class="track-img-ph" style="border-radius:50%;${imgSrc ? 'display:none' : ''}"><i class="ti ti-user" style="font-size:16px;color:var(--text-tertiary)"></i></div>`;
        const genre = (a.genres || [])[0] || 'Artista';
        const followers = a.followers?.total ? a.followers.total.toLocaleString('es-ES') + ' seguidores' : '';
        return `<div class="track-item">
          <span class="track-rank">${i + 1}</span>
          ${img}${imgPh}
          <div class="track-info">
            <div class="track-name">${a.name}</div>
            <div class="track-artist">${genre}${followers ? ' · ' + followers : ''}</div>
          </div>
          <div class="pop-wrap">
            <div class="pop-bar-bg"><div class="pop-bar" style="width:${a.popularity || 0}%"></div></div>
            <div class="pop-label">${a.popularity || 0}% popularidad</div>
          </div>
        </div>`;
      }).join('')}</div>`;

    } else if (currentTab === 'recent' && recent && recent.items) {
      mainContent = `<div class="track-list">${recent.items.slice(0, 30).map((item, i) => {
        const t = item.track;
        const imgSrc = t.album.images[0] ? (t.album.images[1]?.url || t.album.images[0].url) : null;
        const img = imgSrc
          ? `<img class="track-img" src="${imgSrc}">`
          : `<div class="track-img-ph"><i class="ti ti-music" style="font-size:16px;color:var(--text-tertiary)"></i></div>`;
        const played = new Date(item.played_at);
        const timeStr = played.toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' })
          + ' · ' + played.toLocaleDateString('es-ES', { day: 'numeric', month: 'short' });
        return `<div class="track-item">
          <span class="track-rank" style="font-size:10px">${i + 1}</span>
          ${img}
          <div class="track-info">
            <div class="track-name">${t.name}</div>
            <div class="track-artist">${t.artists.map(a => a.name).join(', ')}</div>
          </div>
          <div class="time-label">${timeStr}</div>
        </div>`;
      }).join('')}</div>`;

    } else if (currentTab === 'taste') {
      const audioFeatures = [
        { key: 'danceability', label: 'Bailabilidad', icon: 'ti-brand-spotify' },
        { key: 'energy', label: 'Energía', icon: 'ti-bolt' },
        { key: 'valence', label: 'Positividad', icon: 'ti-sun' },
        { key: 'acousticness', label: 'Acústica', icon: 'ti-music' },
        { key: 'instrumentalness', label: 'Instrumental', icon: 'ti-device-audio-tape' },
        { key: 'speechiness', label: 'Spoken word', icon: 'ti-microphone' },
      ];

      const avgFeatures = {};
      if (topTracks && topTracks.items) {
        audioFeatures.forEach(f => {
          const vals = topTracks.items.map(t => t[f.key] || 0);
          avgFeatures[f.key] = vals.reduce((a, b) => a + b, 0) / vals.length;
        });
      }

      mainContent = `
        <div class="section-title">Géneros favoritos</div>
        <div class="genre-list">
          ${topGenres.map((g, i) => `<span class="genre-pill ${i < 3 ? 'top' : ''}">${g[0]}</span>`).join('')}
        </div>
        <div class="section-title">Características de tu música</div>
        <div class="audio-grid">
          ${audioFeatures.map(f => {
            const val = avgFeatures[f.key] || 0;
            return `<div class="audio-card">
              <div class="audio-name"><i class="ti ${f.icon}" style="font-size:14px"></i>${f.label}</div>
              <div class="audio-bar-bg"><div class="audio-bar" style="width:${Math.round(val * 100)}%"></div></div>
              <div class="audio-val">${Math.round(val * 100)}%</div>
            </div>`;
          }).join('')}
        </div>`;
    }

    document.getElementById('content').innerHTML = `
      <div class="user-header">
        ${avatarUrl
          ? `<img class="user-avatar" src="${avatarUrl}">`
          : `<div class="user-avatar-ph">${initials}</div>`}
        <div>
          <div class="user-name">${profile.display_name || profile.id}</div>
          <div class="user-info">${(profile.followers?.total || 0).toLocaleString()} seguidores · ${profile.country}</div>
        </div>
        <button class="logout-btn" onclick="logout()">Desconectar</button>
      </div>
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-label">Minutos (recientes)</div>
          <div class="stat-value">${Math.round(totalMinutes)}</div>
          <div class="stat-sub">últimas 50 escuchas</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Artistas únicos</div>
          <div class="stat-value">${uniqueArtists.size}</div>
          <div class="stat-sub">en recientes</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Popularidad media</div>
          <div class="stat-value">${avgPop}</div>
          <div class="stat-sub">en tu top tracks</div>
        </div>
      </div>
      ${nowPlayingHtml}
      ${tabsHtml}
      <div id="main-content">${mainContent}</div>`;
  }

  function setTab(tab) {
    currentTab = tab;
    renderDashboard();
  }

  function setPeriod(p) {
    currentPeriod = p;
    loadAndRender();
  }

  function setLimit(val) {
    displayLimit = parseInt(val);
    renderDashboard();
  }

  async function init() {
    const params = new URLSearchParams(window.location.search);
    const code = params.get('code');
    const storedToken = sessionStorage.getItem('spotify_token');
    const tokenExp = sessionStorage.getItem('spotify_token_exp');

    if (code) {
      renderLoading();
      const ok = await exchangeCode(code);
      if (ok) { loadAndRender(); } else { renderConnect(); }
    } else if (storedToken && tokenExp && Date.now() < parseInt(tokenExp)) {
      accessToken = storedToken;
      loadAndRender();
    } else {
      renderConnect();
    }
  }

  init();
</script>
</body>
</html>
