<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>mystats.fm</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg-primary: #ffffff; --bg-secondary: #f5f5f5; --bg-tertiary: #ececec;
      --text-primary: #111111; --text-secondary: #666666; --text-tertiary: #aaaaaa;
      --border: rgba(0,0,0,0.1); --border-strong: rgba(0,0,0,0.2);
      --radius-md: 8px; --radius-lg: 12px; --green: #1DB954; --green-hover: #1ed760;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg-primary: #121212; --bg-secondary: #1e1e1e; --bg-tertiary: #2a2a2a;
        --text-primary: #ffffff; --text-secondary: #aaaaaa; --text-tertiary: #666666;
        --border: rgba(255,255,255,0.1); --border-strong: rgba(255,255,255,0.2);
      }
    }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg-tertiary); color: var(--text-primary); min-height: 100vh; }
    #app { max-width: 680px; margin: 0 auto; padding: 2rem 1rem; }

    /* Header */
    .header { display: flex; align-items: center; gap: 12px; margin-bottom: 2rem; }
    .logo { width: 40px; height: 40px; background: var(--green); border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .logo svg { width: 22px; height: 22px; fill: white; }
    .header h1 { font-size: 22px; font-weight: 600; }
    .header p { font-size: 13px; color: var(--text-secondary); }

    /* Connect */
    .connect-box { background: var(--bg-primary); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 3rem 2rem; text-align: center; }
    .connect-box h2 { font-size: 18px; font-weight: 600; margin-bottom: 0.5rem; }
    .connect-box p { color: var(--text-secondary); font-size: 14px; margin-bottom: 2rem; line-height: 1.7; max-width: 380px; margin-left: auto; margin-right: auto; }
    .btn-spotify { background: var(--green); color: white; border: none; border-radius: 999px; padding: 12px 32px; font-size: 15px; font-weight: 600; cursor: pointer; display: inline-flex; align-items: center; gap: 8px; transition: background 0.15s; }
    .btn-spotify:hover { background: var(--green-hover); }

    /* User header */
    .user-header { display: flex; align-items: center; gap: 12px; margin-bottom: 1.5rem; padding-bottom: 1rem; border-bottom: 1px solid var(--border); }
    .user-avatar { width: 48px; height: 48px; border-radius: 50%; object-fit: cover; }
    .user-avatar-ph { width: 48px; height: 48px; border-radius: 50%; background: var(--bg-secondary); display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: 600; color: var(--text-secondary); flex-shrink: 0; }
    .user-name { font-size: 16px; font-weight: 600; }
    .user-info { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }
    .logout-btn { margin-left: auto; font-size: 12px; padding: 6px 14px; border: 1px solid var(--border-strong); border-radius: 999px; background: none; cursor: pointer; color: var(--text-secondary); }
    .logout-btn:hover { background: var(--bg-secondary); }

    /* Stats grid */
    .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 1.5rem; }
    .stat-card { background: var(--bg-primary); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 1rem; }
    .stat-label { font-size: 11px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; }
    .stat-value { font-size: 24px; font-weight: 700; }
    .stat-sub { font-size: 11px; color: var(--text-tertiary); margin-top: 2px; }

    /* Now playing */
    .now-playing { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-radius: var(--radius-md); background: var(--bg-primary); border: 1px solid var(--border); margin-bottom: 1rem; }
    .now-playing-pulse { width: 8px; height: 8px; border-radius: 50%; background: var(--green); flex-shrink: 0; animation: pulse 2s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(0.8)} }
    .now-playing-img { width: 44px; height: 44px; border-radius: 4px; object-fit: cover; flex-shrink: 0; }
    .now-playing-label { font-size: 10px; color: var(--green); font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; }
    .now-playing-track { font-size: 14px; font-weight: 600; }
    .now-playing-artist { font-size: 12px; color: var(--text-secondary); }

    /* History upload bar */
    .history-upload-bar { margin-bottom: 1rem; }
    .history-upload-label { display: inline-flex; align-items: center; gap: 8px; padding: 8px 16px; border-radius: 999px; border: 1px dashed var(--border-strong); cursor: pointer; font-size: 12px; color: var(--text-secondary); transition: all 0.15s; }
    .history-upload-label:hover { border-color: var(--green); color: var(--green); }
    .history-controls { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; font-size: 12px; color: var(--text-secondary); padding: 10px 14px; background: var(--bg-primary); border: 1px solid var(--border); border-radius: var(--radius-md); }
    .history-controls input[type="date"] { font-size: 12px; padding: 4px 8px; border: 1px solid var(--border-strong); border-radius: 6px; background: var(--bg-primary); color: var(--text-primary); cursor: pointer; }
    .btn-sm { font-size: 12px; padding: 4px 12px; border-radius: 6px; cursor: pointer; border: none; }
    .btn-sm-green { background: var(--green); color: white; }
    .btn-sm-ghost { background: none; border: 1px solid var(--border-strong) !important; color: var(--text-secondary); }

    /* Tabs */
    .tabs { display: flex; gap: 0; border-bottom: 1px solid var(--border); overflow-x: auto; scrollbar-width: none; -ms-overflow-style: none; }
    .tabs::-webkit-scrollbar { display: none; }
    .tab { padding: 10px 14px; font-size: 13px; cursor: pointer; border: none; background: none; color: var(--text-secondary); border-bottom: 2px solid transparent; margin-bottom: -1px; white-space: nowrap; font-weight: 500; transition: color 0.15s; }
    .tab:hover { color: var(--text-primary); }
    .tab.active { color: var(--green); border-bottom-color: var(--green); }

    /* Period + limit controls */
    .controls-bar { display: flex; justify-content: space-between; align-items: center; margin: 1rem 0; flex-wrap: wrap; gap: 8px; }
    .period-btns { display: flex; gap: 6px; }
    .period-btn { font-size: 12px; padding: 5px 14px; border: 1px solid var(--border-strong); border-radius: 999px; background: none; cursor: pointer; color: var(--text-secondary); transition: all 0.15s; }
    .period-btn:hover { border-color: var(--green); color: var(--green); }
    .period-btn.active { background: var(--green); color: white; border-color: var(--green); }
    .limit-select { font-size: 12px; padding: 4px 8px; border: 1px solid var(--border-strong); border-radius: 6px; background: var(--bg-primary); color: var(--text-primary); cursor: pointer; }

    /* Track list */
    .track-list { display: flex; flex-direction: column; gap: 6px; }
    .track-item { display: flex; align-items: center; gap: 12px; padding: 10px 12px; border-radius: var(--radius-md); border: 1px solid var(--border); background: var(--bg-primary); transition: background 0.15s; }
    .track-item:hover { background: var(--bg-secondary); }
    a.track-item { text-decoration: none; cursor: pointer; }
    a.track-item:hover .track-name { color: var(--green); }
    .track-rank { font-size: 12px; color: var(--text-tertiary); min-width: 22px; text-align: center; font-weight: 600; }
    .track-img { width: 42px; height: 42px; border-radius: 4px; object-fit: cover; flex-shrink: 0; }
    .track-img-ph { width: 42px; height: 42px; border-radius: 4px; background: var(--bg-secondary); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .track-info { flex: 1; min-width: 0; }
    .track-name { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--text-primary); }
    .track-artist { font-size: 12px; color: var(--text-secondary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px; }
    .track-meta { font-size: 11px; color: var(--text-tertiary); text-align: right; flex-shrink: 0; line-height: 1.5; }
    .time-label { font-size: 10px; color: var(--text-tertiary); text-align: right; flex-shrink: 0; white-space: nowrap; }

    /* Banner */
    .banner { display: flex; align-items: flex-start; gap: 10px; padding: 12px 14px; border-radius: var(--radius-md); border: 1px solid var(--border); background: var(--bg-secondary); margin-bottom: 1rem; font-size: 12px; color: var(--text-secondary); line-height: 1.6; }
    .banner a { color: var(--green); text-decoration: none; }

    /* Taste tab */
    .section-title { font-size: 11px; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 0.75rem; }
    .genre-list { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 2rem; }
    .genre-pill { padding: 5px 14px; border-radius: 999px; border: 1px solid var(--border-strong); font-size: 13px; color: var(--text-secondary); }
    .genre-pill.top { background: var(--green); color: white; border-color: var(--green); }
    .audio-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
    .audio-card { background: var(--bg-primary); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 14px; }
    .audio-name { font-size: 12px; color: var(--text-secondary); margin-bottom: 8px; }
    .audio-bar-bg { height: 4px; background: var(--bg-tertiary); border-radius: 2px; }
    .audio-bar { height: 4px; border-radius: 2px; background: var(--green); }
    .audio-val { font-size: 20px; font-weight: 700; margin-top: 6px; }

    /* Loading */
    .loading { text-align: center; padding: 4rem; color: var(--text-secondary); font-size: 14px; }
    .spinner { width: 32px; height: 32px; border: 2px solid var(--border); border-top-color: var(--green); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 1rem; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Charts */
    .chart-section { margin-bottom: 2rem; }
    .chart-title { font-size: 14px; font-weight: 600; color: var(--text-primary); margin-bottom: 0.25rem; }
    .chart-subtitle { font-size: 12px; color: var(--text-secondary); margin-bottom: 1rem; }
    .chart-wrap { background: var(--bg-primary); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 1.25rem; overflow: hidden; }
    canvas { max-width: 100%; }

    /* Heatmap */
    .heatmap { display: grid; grid-template-columns: 40px repeat(24, 1fr); gap: 2px; font-size: 10px; }
    .heatmap-cell { aspect-ratio: 1; border-radius: 2px; }
    .heatmap-label { display: flex; align-items: center; justify-content: flex-end; padding-right: 4px; color: var(--text-tertiary); font-size: 10px; white-space: nowrap; }
    .heatmap-hour-labels { display: grid; grid-template-columns: 40px repeat(24, 1fr); gap: 2px; margin-bottom: 4px; }

    /* Year comparison */
    .year-pills { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 1rem; }
    .year-pill { font-size: 12px; padding: 4px 12px; border: 1px solid var(--border-strong); border-radius: 999px; cursor: pointer; background: none; color: var(--text-secondary); transition: all 0.15s; }
    .year-pill.active { background: var(--green); color: white; border-color: var(--green); }
  </style>
</head>
<body>
<div id="app">
  <div class="header">
    <div class="logo">
      <svg viewBox="0 0 24 24"><path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.02.599-1.559.3z"/></svg>
    </div>
    <div>
      <h1>mystats.fm</h1>
      <p>Tu historial de Spotify</p>
    </div>
  </div>
  <div id="content"></div>
</div>

<script>
  const CLIENT_ID = '28ca6f900b2a4af189988ba5f533cd46';
  const REDIRECT_URI = window.location.origin + window.location.pathname;
  const SCOPES = 'user-read-recently-played user-top-read user-read-currently-playing user-read-private';
  const SCOPES_VERSION = 'v6';

  let accessToken = null;
  let currentTab = 'tracks';
  let currentPeriod = 'short_term';
  let displayLimit = 10;
  let userData = {};

  // Extended history state
  let historyData = null;
  let historyDateFrom = null;
  let historyDateTo = null;
  let selectedYears = [];
  let chartInstances = {};

  // ── Auth ──────────────────────────────────────────────────────────
  async function pkceChallengeFromVerifier(v) {
    const data = new TextEncoder().encode(v);
    const digest = await window.crypto.subtle.digest('SHA-256', data);
    return btoa(String.fromCharCode(...new Uint8Array(digest))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');
  }

  function generateVerifier(length) {
    const possible = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
    const values = crypto.getRandomValues(new Uint8Array(length));
    return values.reduce((acc, x) => acc + possible[x % possible.length], '');
  }

  async function login() {
    const verifier = generateVerifier(128);
    const challenge = await pkceChallengeFromVerifier(verifier);
    sessionStorage.setItem('pkce_verifier', verifier);
    const params = new URLSearchParams({ client_id: CLIENT_ID, response_type: 'code', redirect_uri: REDIRECT_URI, scope: SCOPES, code_challenge_method: 'S256', code_challenge: challenge });
    window.location.href = 'https://accounts.spotify.com/authorize?' + params.toString();
  }

  async function exchangeCode(code) {
    const verifier = sessionStorage.getItem('pkce_verifier');
    const resp = await fetch('https://accounts.spotify.com/api/token', {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: new URLSearchParams({ client_id: CLIENT_ID, grant_type: 'authorization_code', code, redirect_uri: REDIRECT_URI, code_verifier: verifier }),
    });
    const data = await resp.json();
    if (data.access_token) {
      accessToken = data.access_token;
      sessionStorage.setItem('spotify_token', accessToken);
      sessionStorage.setItem('spotify_token_exp', Date.now() + data.expires_in * 1000);
      sessionStorage.setItem('scopes_version', SCOPES_VERSION);
      if (data.refresh_token) sessionStorage.setItem('spotify_refresh_token', data.refresh_token);
      window.history.replaceState({}, '', window.location.pathname);
      return true;
    }
    return false;
  }

  async function refreshAccessToken() {
    const refreshToken = sessionStorage.getItem('spotify_refresh_token');
    if (!refreshToken) return false;
    const resp = await fetch('https://accounts.spotify.com/api/token', {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: new URLSearchParams({ grant_type: 'refresh_token', refresh_token: refreshToken, client_id: CLIENT_ID }),
    });
    const data = await resp.json();
    if (data.access_token) {
      accessToken = data.access_token;
      sessionStorage.setItem('spotify_token', accessToken);
      sessionStorage.setItem('spotify_token_exp', Date.now() + data.expires_in * 1000);
      if (data.refresh_token) sessionStorage.setItem('spotify_refresh_token', data.refresh_token);
      return true;
    }
    return false;
  }

  async function spotifyGet(path) {
    let r = await fetch('https://api.spotify.com/v1' + path, { headers: { Authorization: 'Bearer ' + accessToken } });
    if (r.status === 401) {
      const refreshed = await refreshAccessToken();
      if (refreshed) r = await fetch('https://api.spotify.com/v1' + path, { headers: { Authorization: 'Bearer ' + accessToken } });
      else { logout(); return null; }
    }
    if (r.status === 204 || !r.ok) return null;
    const text = await r.text();
    return text ? JSON.parse(text) : null;
  }

  function logout() {
    sessionStorage.clear();
    accessToken = null;
    userData = {};
    historyData = null;
    renderConnect();
  }

  // ── Extended History ──────────────────────────────────────────────
  function processHistoryFiles(files) {
    const readers = [];
    let allEntries = [];
    let loaded = 0;

    Array.from(files).forEach(file => {
      const reader = new FileReader();
      readers.push(new Promise(resolve => {
        reader.onload = e => {
          try {
            let raw = JSON.parse(e.target.result);
            if (!Array.isArray(raw)) raw = [];
            // Only music tracks, played more than 30s, not skipped
            const valid = raw.filter(e =>
              e.master_metadata_track_name &&
              e.master_metadata_album_artist_name &&
              (e.ms_played || 0) >= 30000
            );
            allEntries = allEntries.concat(valid);
          } catch(err) {
            console.warn('Error parsing file:', file.name, err);
          }
          resolve();
        };
        reader.readAsText(file);
      }));
    });

    Promise.all(readers).then(() => {
      if (allEntries.length === 0) {
        alert('No se encontraron escuchas válidas. Selecciona los archivos Streaming_History_Audio_*.json');
        return;
      }
      // Sort by date
      allEntries.sort((a, b) => new Date(a.ts) - new Date(b.ts));
      historyData = allEntries;
      const dates = allEntries.map(e => new Date(e.ts));
      historyDateFrom = new Date(Math.min(...dates));
      historyDateTo = new Date(Math.max(...dates));
      renderDashboard();
      updateHistoryControls();
    });
  }

  function getFilteredHistory() {
    if (!historyData) return [];
    return historyData.filter(e => {
      const d = new Date(e.ts);
      return d >= historyDateFrom && d <= historyDateTo;
    });
  }

  function getHistoryTopTracks(limit) {
    const map = {};
    getFilteredHistory().forEach(e => {
      const key = e.master_metadata_track_name + '|||' + e.master_metadata_album_artist_name;
      if (!map[key]) map[key] = {
        name: e.master_metadata_track_name,
        artist: e.master_metadata_album_artist_name,
        album: e.master_metadata_album_album_name || '',
        uri: e.spotify_track_uri || null,
        ms: 0, plays: 0
      };
      map[key].ms += e.ms_played || 0;
      map[key].plays++;
    });
    return Object.values(map).sort((a, b) => b.ms - a.ms).slice(0, limit);
  }

  function getHistoryTopArtists(limit) {
    const map = {};
    getFilteredHistory().forEach(e => {
      const key = e.master_metadata_album_artist_name;
      if (!map[key]) map[key] = { name: key, ms: 0, plays: 0 };
      map[key].ms += e.ms_played || 0;
      map[key].plays++;
    });
    return Object.values(map).sort((a, b) => b.ms - a.ms).slice(0, limit);
  }

  function getHistoryTopAlbums(limit) {
    const map = {};
    getFilteredHistory().forEach(e => {
      const album = e.master_metadata_album_album_name || 'Single/Desconocido';
      const key = album + '|||' + e.master_metadata_album_artist_name;
      if (!map[key]) map[key] = { name: album, artist: e.master_metadata_album_artist_name, ms: 0, plays: 0 };
      map[key].ms += e.ms_played || 0;
      map[key].plays++;
    });
    return Object.values(map).sort((a, b) => b.ms - a.ms).slice(0, limit);
  }

  function getHistoryStats() {
    const filtered = getFilteredHistory();
    const totalMs = filtered.reduce((s, e) => s + (e.ms_played || 0), 0);
    const uniqueTracks = new Set(filtered.map(e => e.master_metadata_track_name + e.master_metadata_album_artist_name)).size;
    const uniqueArtists = new Set(filtered.map(e => e.master_metadata_album_artist_name)).size;
    return { totalMs, uniqueTracks, uniqueArtists, plays: filtered.length };
  }

  function formatMs(ms) {
    const h = Math.floor(ms / 3600000);
    const m = Math.floor((ms % 3600000) / 60000);
    if (h >= 24) {
      const days = Math.floor(h / 24);
      const rh = h % 24;
      return days + 'd ' + rh + 'h';
    }
    if (h > 0) return h + 'h ' + m + 'm';
    return m + ' min';
  }

  function updateHistoryControls() {
    const el = document.getElementById('history-controls');
    if (!el || !historyData) return;
    const from = historyDateFrom.toISOString().split('T')[0];
    const to = historyDateTo.toISOString().split('T')[0];
    el.innerHTML = `
      <span style="color:var(--green);font-weight:600">${historyData.length.toLocaleString('es-ES')} escuchas cargadas</span>
      <span style="color:var(--text-tertiary)">·</span>
      <span>Del</span>
      <input type="date" id="date-from" value="${from}" style="font-size:12px;padding:4px 8px;border:1px solid var(--border-strong);border-radius:6px;background:var(--bg-primary);color:var(--text-primary)">
      <span>al</span>
      <input type="date" id="date-to" value="${to}" style="font-size:12px;padding:4px 8px;border:1px solid var(--border-strong);border-radius:6px;background:var(--bg-primary);color:var(--text-primary)">
      <button class="btn-sm btn-sm-green" onclick="applyDateFilter()">Aplicar</button>
      <button class="btn-sm btn-sm-ghost" onclick="clearHistory()">Quitar</button>`;
  }

  function applyDateFilter() {
    const from = document.getElementById('date-from')?.value;
    const to = document.getElementById('date-to')?.value;
    if (from) historyDateFrom = new Date(from);
    if (to) { historyDateTo = new Date(to); historyDateTo.setHours(23,59,59,999); }
    renderDashboard();
    updateHistoryControls();
  }

  function clearHistory() {
    historyData = null; historyDateFrom = null; historyDateTo = null;
    currentPeriod = 'short_term';
    renderDashboard();
  }

  // ── Spotify API ───────────────────────────────────────────────────
  async function loadAndRender() {
    renderLoading();
    const [profile, topTracks, topArtists, recent, playing] = await Promise.all([
      spotifyGet('/me'),
      spotifyGet('/me/top/tracks?limit=50&time_range=' + currentPeriod),

  function setTab(tab) { destroyCharts(); currentTab = tab; renderDashboard(); }

  // ── Chart helpers ─────────────────────────────────────────────────
  function destroyCharts() {
    Object.values(chartInstances).forEach(c => { try { c.destroy(); } catch(e){} });
    chartInstances = {};
  }

  function getYearsInHistory() {
    if (!historyData) return [];
    const years = new Set(historyData.map(e => new Date(e.ts).getFullYear()));
    return [...years].sort();
  }

  function getMonthlyData(years) {
    const map = {};
    getFilteredHistory().filter(e => {
      const y = new Date(e.ts).getFullYear();
      return years.length === 0 || years.includes(y);
    }).forEach(e => {
      const d = new Date(e.ts);
      const key = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0');
      if (!map[key]) map[key] = { ms: 0, plays: 0 };
      map[key].ms += e.ms_played || 0;
      map[key].plays++;
    });
    return map;
  }

  function getHeatmapData() {
    const days = ['Lun','Mar','Mié','Jue','Vie','Sáb','Dom'];
    const grid = Array(7).fill(null).map(() => Array(24).fill(0));
    getFilteredHistory().forEach(e => {
      const d = new Date(e.ts);
      const dow = (d.getDay() + 6) % 7; // Mon=0
      const hour = d.getHours();
      grid[dow][hour]++;
    });
    return { grid, days };
  }

  function renderCharts() {
    destroyCharts();
    const allYears = getYearsInHistory();
    if (selectedYears.length === 0) selectedYears = allYears.slice(-3);

    // Monthly plays chart
    const monthlyMap = getMonthlyData([]);
    const allMonths = Object.keys(monthlyMap).sort();
    const monthLabels = allMonths.map(m => {
      const [y, mo] = m.split('-');
      return ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'][parseInt(mo)-1] + ' ' + y.slice(2);
    });

    const ctx1 = document.getElementById('chart-monthly');
    if (ctx1) {
      chartInstances.monthly = new Chart(ctx1, {
        type: 'bar',
        data: {
          labels: monthLabels,
          datasets: [{
            label: 'Horas escuchadas',
            data: allMonths.map(m => Math.round((monthlyMap[m]?.ms || 0) / 3600000 * 10) / 10),
            backgroundColor: 'rgba(29,185,84,0.7)',
            borderColor: '#1DB954',
            borderWidth: 1,
            borderRadius: 3,
          }]
        },
        options: {
          responsive: true,
          plugins: { legend: { display: false }, tooltip: { callbacks: { label: ctx => ctx.parsed.y + 'h escuchadas' } } },
          scales: {
            x: { ticks: { maxTicksLimit: 12, color: '#888', font: { size: 10 } }, grid: { display: false } },
            y: { ticks: { color: '#888', font: { size: 10 } }, grid: { color: 'rgba(128,128,128,0.1)' } }
          }
        }
      });
    }

    // Year comparison chart
    const ctx2 = document.getElementById('chart-years');
    if (ctx2 && selectedYears.length > 0) {
      const months = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
      const colors = ['#1DB954','#1ed760','#17a349','#0d7a32','#64d98a','#a8f0be'];
      const datasets = selectedYears.map((year, i) => {
        const data = Array(12).fill(0);
        getFilteredHistory().filter(e => new Date(e.ts).getFullYear() === year).forEach(e => {
          const mo = new Date(e.ts).getMonth();
          data[mo] += (e.ms_played || 0) / 3600000;
        });
        return {
          label: String(year),
          data: data.map(v => Math.round(v * 10) / 10),
          borderColor: colors[i % colors.length],
          backgroundColor: 'transparent',
          borderWidth: 2,
          pointRadius: 3,
          tension: 0.3,
        };
      });
      chartInstances.years = new Chart(ctx2, {
        type: 'line',
        data: { labels: months, datasets },
        options: {
          responsive: true,
          plugins: { legend: { labels: { color: '#888', font: { size: 11 } } }, tooltip: { callbacks: { label: ctx => ctx.dataset.label + ': ' + ctx.parsed.y + 'h' } } },
          scales: {
            x: { ticks: { color: '#888', font: { size: 10 } }, grid: { display: false } },
            y: { ticks: { color: '#888', font: { size: 10 } }, grid: { color: 'rgba(128,128,128,0.1)' } }
          }
        }
      });
    }

    // Heatmap
    const heatEl = document.getElementById('heatmap-grid');
    if (heatEl) {
      const { grid, days } = getHeatmapData();
      const max = Math.max(...grid.flat());
      let html = '<div class="heatmap-hour-labels"><div></div>' + Array(24).fill(0).map((_,h) => `<div style="text-align:center;color:var(--text-tertiary);font-size:9px">${h}h</div>`).join('') + '</div>';
      html += '<div class="heatmap">';
      grid.forEach((row, di) => {
        html += `<div class="heatmap-label">${days[di]}</div>`;
        row.forEach(val => {
          const intensity = max > 0 ? val / max : 0;
          const alpha = 0.08 + intensity * 0.92;
          html += `<div class="heatmap-cell" style="background:rgba(29,185,84,${alpha.toFixed(2)})" title="${val} plays"></div>`;
        });
      });
      html += '</div>';
      heatEl.innerHTML = html;
    }
  }
  function setPeriod(p) { currentPeriod = p; loadAndRender(); }
  function setLimit(val) { displayLimit = parseInt(val); renderDashboard(); }

  function toggleYear(year) {
    if (selectedYears.includes(year)) {
      if (selectedYears.length > 1) selectedYears = selectedYears.filter(y => y !== year);
    } else {
      selectedYears = [...selectedYears, year].sort();
    }
    destroyCharts();
    const allYears = getYearsInHistory();
    const s = getHistoryStats();
    // Re-render just the year chart and pills without full re-render
    renderDashboard();
  }

  // ── Init ──────────────────────────────────────────────────────────
  async function init() {
    const params = new URLSearchParams(window.location.search);
    const code = params.get('code');
    const storedToken = sessionStorage.getItem('spotify_token');
    const tokenExp = sessionStorage.getItem('spotify_token_exp');

    if (code) {
      renderLoading();
      const ok = await exchangeCode(code);
      if (ok) loadAndRender(); else renderConnect();
    } else if (storedToken && sessionStorage.getItem('scopes_version') === SCOPES_VERSION) {
      accessToken = storedToken;
      if (Date.now() >= parseInt(tokenExp)) {
        const refreshed = await refreshAccessToken();
        if (refreshed) loadAndRender(); else renderConnect();
      } else {
        loadAndRender();
      }
    } else {
      renderConnect();
    }
  }

  init();
</script>
</body>
</html>
